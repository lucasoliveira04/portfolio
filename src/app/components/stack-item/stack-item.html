<span
  (mouseenter)="hover = true"
  (mouseleave)="hover = false"
  [style.background-color]="hover ? color : ''"
  [style.color]="hover ? 'white' : ''"
  class="group flex items-center gap-2 px-4 py-2 bg-gray-100 text-gray-700 rounded-lg text-sm font-medium transition-all duration-300 hover:-translate-y-1 hover:scale-105 hover:shadow-lg cursor-default"
>
  <i [class]="icon + ' text-lg transition-transform duration-300 group-hover:rotate-12'"></i>

  {{ name }}
</span>
