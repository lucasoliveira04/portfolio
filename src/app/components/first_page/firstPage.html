<main
  id="home"
  class="first-page w-full min-h-screen bg-white dark:bg-slate-900 relative overflow-hidden font-[Inter] transition-colors duration-300"
>
  <div
    class="absolute right-0 top-0 w-[300px] h-[300px] sm:w-[400px] sm:h-[400px] md:w-[500px] md:h-[500px] bg-blue-200 dark:bg-blue-900/30 rounded-full blur-3xl opacity-40 pointer-events-none"
  ></div>

  <app-header
    [showNav]="true"
    [showLangSelect]="true"
    [showDarkModeToggle]="true"
    [alwaysShowControls]="true"
  ></app-header>

  <div
    class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 items-center px-4 sm:px-8 md:px-16 lg:px-20 py-12 sm:py-16 md:py-24 gap-10 md:gap-16"
  >
    <!-- LEFT -->
    <div class="flex flex-col gap-5 sm:gap-6 text-center md:text-left order-2 md:order-1">
      <!-- Job title badge -->
      <span
        class="text-blue-600 dark:text-blue-400 font-semibold tracking-wide uppercase text-xs sm:text-sm"
      >
        {{ 'PROFILE.JOB_TITLE' | translate }}
      </span>

      <!-- Heading -->
      <h1
        class="text-3xl sm:text-4xl md:text-4xl lg:text-5xl font-bold leading-tight text-gray-900 dark:text-white"
      >
        {{ 'PROFILE.TITLE_1' | translate }}
        <br />
        {{ 'PROFILE.TITLE_2' | translate }}
      </h1>

      <!-- Description -->
      <p class="text-gray-600 dark:text-slate-300 text-sm sm:text-base max-w-xl mx-auto md:mx-0">
        {{ 'PROFILE.DESCRIPTION' | translate }}
      </p>

      <!-- CTA Buttons -->
      <div
        class="flex flex-col sm:flex-row flex-wrap gap-3 sm:gap-4 justify-center md:justify-start pt-2 sm:pt-4"
      >
        <a
          class="px-6 sm:px-7 py-3 bg-blue-600 dark:bg-blue-500 text-white rounded-lg hover:bg-blue-700 dark:hover:bg-blue-600 transition shadow-md text-sm sm:text-base text-center"
          href="https://example.com/resume"
          target="_blank"
        >
          {{ 'PROFILE.RESUME' | translate }}
        </a>
      </div>

      <!-- Tech Stack -->
      <div class="flex flex-wrap gap-2 sm:gap-3 pt-4 sm:pt-6 justify-center md:justify-start">
        <app-stack-item name="Java" icon="devicon-java-plain" color="#007396"></app-stack-item>
        <app-stack-item
          name="Spring Boot"
          icon="devicon-spring-plain"
          color="#99d98c"
        ></app-stack-item>
        <app-stack-item
          name="JavaScript"
          icon="devicon-javascript-plain"
          color="#F0DB4F"
        ></app-stack-item>
        <app-stack-item
          name="TypeScript"
          icon="devicon-typescript-plain"
          color="#3178C6"
        ></app-stack-item>
        <app-stack-item name="Docker" icon="devicon-docker-plain" color="#2496ED"></app-stack-item>
      </div>

      <!-- Social Links -->
      <div
        class="flex gap-5 sm:gap-6 pt-4 sm:pt-6 justify-center md:justify-start text-xl sm:text-2xl"
      >
        <a
          href="https://www.linkedin.com/in/lucas-oliveira-campos/"
          target="_blank"
          aria-label="LinkedIn"
          class="text-gray-600 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 transition"
        >
          <i class="fab fa-linkedin"></i>
        </a>

        <a
          href="https://github.com/lucasoliveira04"
          target="_blank"
          aria-label="GitHub"
          class="text-gray-600 dark:text-slate-400 hover:text-gray-900 dark:hover:text-white transition"
        >
          <i class="fab fa-github"></i>
        </a>

        <a
          href="mailto:lucasolisocialmedia@gmail.com"
          aria-label="Email"
          class="text-gray-600 dark:text-slate-400 hover:text-red-500 dark:hover:text-red-400 transition"
        >
          <i class="fas fa-envelope"></i>
        </a>
      </div>
    </div>

    <!-- RIGHT — Profile photo -->
    <div class="flex justify-center order-1 md:order-2">
      <div class="relative">
        <!-- Glow effect -->
        <div
          class="absolute inset-0 bg-blue-300 dark:bg-blue-700 blur-3xl opacity-30 rounded-full"
        ></div>

        <!-- Photo -->
        <div
          class="relative w-[220px] h-[220px] sm:w-[280px] sm:h-[280px] md:w-[340px] md:h-[340px] lg:w-[420px] lg:h-[420px] rounded-full overflow-hidden border-4 sm:border-6 md:border-8 border-white dark:border-slate-700 shadow-2xl"
        >
          <img
            [src]="imgPerfil"
            alt="Profile photo"
            class="w-full h-full object-cover transition-all duration-500"
          />
        </div>
      </div>
    </div>
  </div>
</main>
