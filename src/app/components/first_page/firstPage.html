<main class="w-full min-h-screen bg-gradient-to-b from-blue-100 to-white relative overflow-hidden">
  <div
    class="absolute right-10 top-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-blue-300 rounded-full blur-3xl opacity-20"
  ></div>

  @if (showHeader) {
    <app-header></app-header>
  }

  <div class="grid grid-cols-1 md:grid-cols-2 items-center px-10 md:px-24 py-20 gap-12">
    <!-- LADO ESQUERDO -->
    <div class="flex flex-col items-center md:items-start text-center md:text-left">
      <h1 class="text-5xl md:text-6xl font-bold leading-tight">Desenvolvedor Back End</h1>

      <div class="mt-8 flex flex-wrap gap-4 justify-center md:justify-start">
        <a
          [href]="curriculoUrl"
          target="_self"
          class="px-6 py-3 bg-black text-white rounded-full hover:scale-105 transition duration-300 shadow-md"
        >
          Ver Currículo
        </a>

        <a
          routerLink="/projects"
          class="px-6 py-3 border border-black rounded-full hover:bg-black hover:text-white transition duration-300 cursor-pointer"
        >
          Projetos
        </a>
      </div>

      <!-- Stack Tecnologias -->
      <div class="mt-8 flex flex-wrap gap-3 justify-center md:justify-start">
        <span class="px-4 py-1 bg-gray-200 rounded-full text-sm font-medium">Java</span>
        <span class="px-4 py-1 bg-gray-200 rounded-full text-sm font-medium">Spring Framework</span>
        <span class="px-4 py-1 bg-gray-200 rounded-full text-sm font-medium">TypeScript</span>
        <span class="px-4 py-1 bg-gray-200 rounded-full text-sm font-medium">Docker</span>
      </div>

      <!-- Ícones sociais -->
      <div class="mt-8 flex gap-6 text-2xl">
        <a
          [href]="linkedlnUrl"
          target="_blank"
          class="text-blue-700 hover:scale-125 transition duration-300"
        >
          <i class="fab fa-linkedin"></i>
        </a>

        <a
          [href]="githubUrl"
          target="_blank"
          class="text-gray-800 hover:scale-125 transition duration-300"
        >
          <i class="fab fa-github"></i>
        </a>

        <a
          [href]="emailUrl"
          target="_blank"
          class="text-red-600 hover:scale-125 transition duration-300"
        >
          <i class="fas fa-envelope"></i>
        </a>
      </div>
    </div>

    <!-- LADO DIREITO -->
    <div class="flex justify-center">
      <div class="perspective-[1000px] cursor-pointer" (click)="toggleImage()">
        <div
          class="relative w-[350px] md:w-[500px] h-[350px] md:h-[500px] transition-transform duration-700 ease-in-out [transform-style:preserve-3d]"
          [class.[transform:rotateY(180deg)]]="isFlipped"
        >
          <!-- Frente -->
          <div
            class="absolute w-full h-full rounded-full overflow-hidden border-4 border-white shadow-2xl [backface-visibility:hidden]"
          >
            <img src="img/eu/eu_pessoa_real.png" class="w-full h-full object-cover" />
          </div>

          <!-- Verso -->
          <div
            class="absolute w-full h-full rounded-full overflow-hidden border-4 border-white shadow-2xl [transform:rotateY(180deg)] [backface-visibility:hidden]"
          >
            <img src="img/eu/eu_cartoon.png" class="w-full h-full object-cover" />
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
