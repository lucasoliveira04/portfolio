<main
  class="first-page w-full min-h-screen bg-white dark:bg-slate-900 relative overflow-hidden font-[Inter] transition-colors duration-300"
>
  <div
    class="absolute right-0 top-0 w-[500px] h-[500px] bg-blue-200 dark:bg-blue-900/30 rounded-full blur-3xl opacity-40"
  ></div>

  <app-header
    [showNav]="true"
    [showLangSelect]="true"
    [showDarkModeToggle]="true"
    [alwaysShowControls]="true"
  ></app-header>

  <div
    class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 items-center px-8 md:px-20 py-24 gap-16"
  >
    <!-- LEFT -->
    <div class="flex flex-col gap-6 text-center md:text-left">
      <span class="text-blue-600 dark:text-blue-400 font-semibold tracking-wide uppercase text-sm">
        {{ 'PROFILE.JOB_TITLE' | translate }}
      </span>

      <!-- title -->
      <h1 class="text-5xl md:text-4xl font-bold leading-tight text-gray-900 dark:text-white">
        {{ 'PROFILE.TITLE_1' | translate }}
        <br />
        {{ 'PROFILE.TITLE_2' | translate }}
      </h1>

      <!-- description -->
      <p class="text-gray-600 dark:text-slate-300 text-base max-w-xl">
        {{ 'PROFILE.DESCRIPTION' | translate }}
      </p>

      <!-- buttons -->
      <div class="flex flex-wrap gap-4 justify-center md:justify-start pt-4">
        <a
          class="px-7 py-3 bg-blue-600 dark:bg-blue-500 text-white rounded-lg hover:bg-blue-700 dark:hover:bg-blue-600 transition shadow-md"
          href="https://example.com/resume"
          target="_blank"
        >
          {{ 'PROFILE.RESUME' | translate }}
        </a>

        <a
          routerLink="/projects"
          class="px-7 py-3 border border-gray-300 dark:border-slate-600 text-gray-800 dark:text-slate-200 rounded-lg hover:bg-gray-100 dark:hover:bg-slate-800 transition"
        >
          {{ 'PROFILE.VIEW_PROJECTS' | translate }}
        </a>
      </div>

      <!-- stack -->
      <div class="flex flex-wrap gap-3 pt-6 justify-center md:justify-start">
        <app-stack-item name="Java" icon="devicon-java-plain" color="#007396"></app-stack-item>
        <app-stack-item
          name="Spring Boot"
          icon="devicon-spring-plain"
          color="#99d98c"
        ></app-stack-item>
        <app-stack-item
          name="JavaScript"
          icon="devicon-javascript-plain"
          color="#F0DB4F"
        ></app-stack-item>
        <app-stack-item
          name="TypeScript"
          icon="devicon-typescript-plain"
          color="#3178C6"
        ></app-stack-item>
        <app-stack-item name="Docker" icon="devicon-docker-plain" color="#2496ED"></app-stack-item>
      </div>

      <!-- social -->
      <div class="flex gap-6 pt-6 justify-center md:justify-start text-2xl">
        <a
          href="https://www.linkedin.com/in/lucas-oliveira-campos/"
          target="_blank"
          class="text-gray-600 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 transition"
        >
          <i class="fab fa-linkedin"></i>
        </a>

        <a
          href="https://github.com/lucasoliveira04"
          target="_blank"
          class="text-gray-600 dark:text-slate-400 hover:text-white dark:hover:text-white transition"
        >
          <i class="fab fa-github"></i>
        </a>

        <a
          href="mailto:lucasolisocialmedia@gmail.com"
          class="text-gray-600 dark:text-slate-400 hover:text-red-500 dark:hover:text-red-400 transition"
        >
          <i class="fas fa-envelope"></i>
        </a>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="flex justify-center">
      <div class="relative">
        <div
          class="absolute inset-0 bg-blue-300 dark:bg-blue-700 blur-3xl opacity-30 rounded-full"
        ></div>

        <div
          class="relative w-[320px] md:w-[420px] h-[320px] md:h-[420px] rounded-full overflow-hidden border-8 border-white dark:border-slate-700 shadow-2xl"
        >
          <img [src]="imgPerfil" class="w-full h-full object-cover transition-all duration-500" />
        </div>
      </div>
    </div>
  </div>
</main>
