@if (headerService.isVisible()) {
  <header
    @slideDown
    class="fixed top-0 left-0 w-full z-50 backdrop-blur-xl bg-white/70 dark:bg-slate-900/80 border-b border-gray-200 dark:border-slate-700 transition-colors duration-300"
  >
    <div class="max-w-7xl mx-auto px-8 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="text-lg font-semibold tracking-tight">
          <span class="text-gray-900 dark:text-white">Lucas</span>
          <span class="text-blue-600 dark:text-blue-400">.dev</span>
        </div>

        <button
          (click)="scrollToTop()"
          title="Voltar ao topo"
          class="flex items-center justify-center w-7 h-7 rounded-full border border-gray-200 dark:border-slate-600 bg-white dark:bg-slate-800 hover:bg-blue-50 dark:hover:bg-slate-700 hover:border-blue-300 dark:hover:border-blue-500 transition-all duration-200 group"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-3.5 h-3.5 text-gray-400 dark:text-slate-400 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors duration-200"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7" />
          </svg>
        </button>
      </div>

      <div class="flex items-center gap-4 ml-auto">
        @if (showNav()) {
          <nav
            class="hidden md:flex items-center gap-10 text-sm font-medium text-gray-600 dark:text-slate-300"
          >
            @for (item of navItems; track item.id) {
              <a
                [routerLink]="item.path"
                class="hover:text-blue-600 dark:hover:text-blue-400 transition-colors duration-200"
              >
                {{ item.label }}
              </a>
            }
          </nav>
        }
      </div>
    </div>
  </header>
}

@if (alwaysShowControls()) {
  <div class="fixed top-3.5 right-6 z-[60] flex items-center gap-3">
    @if (showLangSelect()) {
      <select
        (change)="changeLanguage($any($event.target).value)"
        class="bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border border-gray-200 dark:border-slate-600 rounded-md px-3 py-1.5 text-sm text-gray-700 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm transition-colors duration-200"
      >
        <option value="pt">PT-BR</option>
        <option value="en">EN</option>
        <option value="es">ES</option>
      </select>
    }

    @if (showDarkModeToggle()) {
      <button
        (click)="toggleDarkMode()"
        class="flex items-center justify-center w-8 h-8 rounded-full border border-gray-200 dark:border-slate-600 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md hover:bg-blue-50 dark:hover:bg-slate-700 shadow-sm transition-all duration-200"
        title="Toggle dark mode"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-4 h-4 hidden dark:block text-yellow-400"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"
          />
        </svg>
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-4 h-4 block dark:hidden text-gray-500"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"
          />
        </svg>
      </button>
    }
  </div>
}
